name: Verify Release Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify GPG + Sonatype Central credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17 and import GPG key
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Show GPG key info and expiry
        run: |
          echo "=== Secret keys in keyring ==="
          gpg --list-secret-keys --keyid-format long
          echo ""
          echo "=== Expiry check ==="
          # Pull epoch from the colon-separated listing; field 7 on pub rows.
          exp_epoch=$(gpg --list-keys --with-colons | awk -F: '/^pub:/ { print $7; exit }')
          if [ -z "$exp_epoch" ] || [ "$exp_epoch" = "0" ]; then
            echo "Primary key has NO EXPIRY."
            exit 0
          fi
          now_epoch=$(date -u +%s)
          days_left=$(( (exp_epoch - now_epoch) / 86400 ))
          when=$(date -u -d "@$exp_epoch" '+%Y-%m-%d %H:%M:%SZ')
          echo "Primary key expires: $when  ($days_left days from now)"
          if [ "$days_left" -lt 0 ]; then
            echo "!! KEY HAS EXPIRED — rotate MAVEN_GPG_PRIVATE_KEY before releasing."
            exit 1
          fi
          if [ "$days_left" -lt 30 ]; then
            echo "!! WARNING: Key expires in under 30 days — plan a rotation."
          fi

      - name: GPG signing smoke test
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          printf 'verify-release-secrets %s\n' "$(date -u +%FT%TZ)" > /tmp/verify.txt
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$MAVEN_GPG_PASSPHRASE" \
              --armor --detach-sign \
              --output /tmp/verify.txt.asc \
              /tmp/verify.txt
          gpg --verify /tmp/verify.txt.asc /tmp/verify.txt
          echo "GPG sign + verify OK."

      - name: Sonatype Central credentials check
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME || secrets.OSSRH_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN || secrets.OSSRH_TOKEN }}
        run: |
          AUTH=$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_TOKEN" | base64 -w0)
          URL='https://central.sonatype.com/api/v1/publisher/published?namespace=sh.oso&name=akka-openapi-maven-plugin&version=1.0.0'
          STATUS=$(curl -s -o /tmp/central-resp -w "%{http_code}" \
            -H "Authorization: Bearer $AUTH" \
            -H "Accept: application/json" \
            "$URL")
          echo "HTTP $STATUS"
          echo "Response body:"
          cat /tmp/central-resp; echo
          case "$STATUS" in
            200|201|204)
              echo "Sonatype Central credentials OK."
              ;;
            401|403)
              echo "!! Auth failed - rotate CENTRAL_USERNAME / CENTRAL_TOKEN."
              exit 1
              ;;
            *)
              echo "!! Unexpected status $STATUS from Central Portal."
              exit 1
              ;;
          esac

      - name: Full release profile build (no deploy)
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME || secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN || secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress \
            -Prelease \
            -DskipTests \
            -Dinvoker.skip=true \
            -DskipPublishing=true
          echo ""
          echo "=== Signed artifacts ==="
          find . -name "*.asc" -not -path "*/\.*" | sort

      - name: Summary
        run: |
          echo "All release-secret checks passed."
          echo "Safe to merge a release-please release PR or manually dispatch release.yml."
