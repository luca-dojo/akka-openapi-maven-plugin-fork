name: Release to Maven Central

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.2). Required for manual dispatch.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Get version from release event or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set version in POM
        run: |
          mvn versions:set -DnewVersion=${{ steps.get-version.outputs.version }} --batch-mode
          mvn versions:commit --batch-mode

      - name: Build and test
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress

  build-and-sign:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 for publishing
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set version in POM
        run: |
          mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} --batch-mode
          mvn versions:commit --batch-mode

      - name: Build and sign artifacts
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress \
            -Prelease \
            -DskipTests

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn deploy \
            --batch-mode \
            --no-transfer-progress \
            -Prelease \
            -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-artifacts
          path: |
            **/target/*.jar
            **/target/*.pom
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          files: |
            **/target/*.jar
            !**/target/original-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release v${{ needs.validate.outputs.version }} published!"
          echo ""
          echo "🎯 Release Checklist:"
          echo "- ✅ Code signed with GPG"
          echo "- ✅ Deployed to Maven Central Staging"
          echo "- ✅ GitHub Release created"
          echo ""
          echo "📦 Maven Central Sync Timeline:"
          echo "- Immediate: Available in staging repository"
          echo "- 10-30 min: Synced to Maven Central"
          echo "- 2-3 hours: Searchable in Maven Central"
          echo ""
          echo "🔗 Maven Central URL (after sync):"
          echo "https://search.maven.org/artifact/sh.oso/akka-openapi-maven-plugin/${{ needs.validate.outputs.version }}"
          echo ""
          echo "📚 Usage:"
          echo "<plugin>"
          echo "  <groupId>sh.oso</groupId>"
          echo "  <artifactId>akka-openapi-maven-plugin</artifactId>"
          echo "  <version>${{ needs.validate.outputs.version }}</version>"
          echo "</plugin>"

  notify:
    needs: [ validate, build-and-sign ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
        with:
          status: ${{ job.status }}
          text: "akka-openapi-maven-plugin v${{ needs.validate.outputs.version }} release ${{ job.status == 'success' && 'succeeded' || 'failed' }}!"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
